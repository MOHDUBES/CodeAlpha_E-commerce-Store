<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping Cart — ShopVerse</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="navbar-root"></div>
  <div class="page-header container">
    <div style="margin-bottom: 1rem;"><a href="/" class="btn btn-outline btn-sm">&larr; Continue Shopping</a></div>
    <h1 class="page-title"> Shopping Cart</h1>
    <p class="page-subtitle" id="cart-subtitle">Loading your cart...</p>
  </div>

  <div class="container">
    <div class="loading" id="loading">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>

    <div id="cart-content" style="display:none">
      <div class="cart-layout">
        <div>
          <div class="card" id="cart-items-container"></div>
        </div>
        <div>
          <div class="summary-card" id="order-summary">
            <h3 style="margin-bottom:1.2rem;font-size:1.1rem">Order Summary</h3>
            <div id="summary-items"></div>
            <div class="summary-row total">
              <span>Total</span>
              <span id="total-price">₹0</span>
            </div>
            <div style="margin-top:0.5rem;font-size:0.8rem;color:var(--text-secondary);text-align:center;padding:0.5rem">
               Free delivery on all orders
            </div>
            <a href="/checkout" class="btn btn-primary" id="checkout-btn" 
              style="width:100%;justify-content:center;margin-top:1rem">
              Proceed to Checkout →
            </a>
            <a href="/" class="btn btn-outline" 
              style="width:100%;justify-content:center;margin-top:0.8rem">
              Continue Shopping
            </a>
          </div>
        </div>
      </div>
    </div>

    <div id="empty-cart" style="display:none" class="empty-state">
      <div class="empty-icon"></div>
      <div class="empty-title">Your cart is empty</div>
      <div class="empty-text">Add some amazing products to get started!</div>
      <a href="/" class="btn btn-primary">Start Shopping</a>
    </div>
  </div>

  <script src="/js/main.js?v=2"></script>
  <script>
    let cartItems = [];

    async function loadCart() {
      document.getElementById('navbar-root').innerHTML = renderNavbar();
      updateNavAuth();

      try {
        const res = await fetch(`${API}/cart?session_id=${getSessionId()}`, {
          headers: getHeaders()
        });
        cartItems = await res.json();
        renderCart();
      } catch {
        showToast('Failed to load cart', 'error');
      }
    }

    function renderCart() {
      document.getElementById('loading').style.display = 'none';

      if (cartItems.length === 0) {
        document.getElementById('empty-cart').style.display = 'block';
        document.getElementById('cart-content').style.display = 'none';
        document.getElementById('cart-subtitle').textContent = '0 items';
        return;
      }

      document.getElementById('cart-content').style.display = 'block';
      const total = cartItems.reduce((s, i) => s + i.price * i.quantity, 0);
      const totalItems = cartItems.reduce((s, i) => s + i.quantity, 0);

      document.getElementById('cart-subtitle').textContent = `${totalItems} item${totalItems !== 1 ? 's' : ''} in your cart`;
      document.getElementById('total-price').textContent = formatPrice(total);

      // Update cart count badge
      document.querySelectorAll('.cart-count').forEach(el => {
        el.textContent = totalItems;
        el.style.display = totalItems > 0 ? 'flex' : 'none';
      });

      document.getElementById('cart-items-container').innerHTML = cartItems.map(item => `
        <div class="cart-item" id="item-${item.id}">
          <img src="${item.image}" alt="${item.name}" class="cart-item-img"
            onerror="this.src='https://via.placeholder.com/80x80/1e1e2a/6c63ff?text=P'">
          <div class="cart-item-info">
            <div class="cart-item-name">${item.name}</div>
            <div class="cart-item-price">${formatPrice(item.price)}</div>
            <div class="quantity-control">
              <button class="qty-btn" onclick="updateQty(${item.id}, ${item.quantity - 1})">−</button>
              <span class="qty-display">${item.quantity}</span>
              <button class="qty-btn" onclick="updateQty(${item.id}, ${item.quantity + 1})">+</button>
            </div>
          </div>
          <div style="text-align:right">
            <div style="font-weight:700;font-size:1rem;margin-bottom:0.8rem">${formatPrice(item.price * item.quantity)}</div>
            <button class="btn btn-danger btn-sm" onclick="removeItem(${item.id})">️ Remove</button>
          </div>
        </div>
      `).join('');

      document.getElementById('summary-items').innerHTML = cartItems.map(item => `
        <div class="summary-row">
          <span style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${item.name} ×${item.quantity}</span>
          <span>${formatPrice(item.price * item.quantity)}</span>
        </div>
      `).join('') + `
        <div class="summary-row"><span>Delivery</span><span style="color:var(--success)">FREE</span></div>
      `;
    }

    async function updateQty(id, newQty) {
      await fetch(`${API}/cart/update/${id}`, {
        method: 'PUT',
        headers: getHeaders(),
        body: JSON.stringify({ quantity: newQty })
      });
      await loadCart();
    }

    async function removeItem(id) {
      await fetch(`${API}/cart/remove/${id}`, { method: 'DELETE', headers: getHeaders() });
      await loadCart();
      showToast('Item removed', 'info');
    }

    loadCart();
  </script>
</body>
</html>
