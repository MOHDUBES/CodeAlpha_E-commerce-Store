<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — ShopVerse</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      <a href="/" style="display:block">
        <div class="auth-logo">️ ShopVerse</div>
      </a>
      <p class="auth-subtitle">Welcome back! Sign in to your account</p>

      <form onsubmit="handleLogin(event)">
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" id="login-email" class="form-input" placeholder="john@example.com" required>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" id="login-password" class="form-input" placeholder="Your password" required>
          <div style="text-align:right;margin-top:0.4rem">
            <a href="/forgot-password" style="font-size:0.8rem;color:var(--accent);text-decoration:none">Forgot Password?</a>
          </div>
        </div>

        <div id="login-error" style="display:none;color:var(--danger);font-size:0.85rem;margin-bottom:1rem;padding:0.7rem;background:rgba(255,77,109,0.1);border-radius:8px;border:1px solid rgba(255,77,109,0.3)"></div>

        <button type="submit" class="btn btn-primary" id="login-btn" style="width:100%;justify-content:center">
          Sign In →
        </button>
      </form>

      <div class="auth-switch">
        Don't have an account? <a href="/register">Sign Up</a>
      </div>

      <div style="margin-top:1.5rem;padding:1rem;background:var(--bg-secondary);border-radius:10px;font-size:0.82rem;color:var(--text-secondary)">
         <strong>Demo:</strong> Register a new account to test all features
      </div>
    </div>
  </div>

  <script src="/js/main.js?v=2"></script>
  <script>
    if (isLoggedIn()) window.location = '/';

    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      const errEl = document.getElementById('login-error');
      btn.disabled = true;
      btn.textContent = '⏳ Signing in...';
      errEl.style.display = 'none';

      try {
        const res = await fetch(`${API}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('login-email').value,
            password: document.getElementById('login-password').value
          })
        });
        const data = await res.json();
        if (data.token) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('user', JSON.stringify(data.user));
          window.location = '/';
        } else {
          errEl.textContent = data.error || 'Login failed';
          errEl.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Sign In →';
        }
      } catch {
        errEl.textContent = 'Server error. Please try again.';
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Sign In →';
      }
    }
  </script>
</body>
</html>
